<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

const C={bg:"#0d0f14",surface:"#151820",surface2:"#1c2030",border:"#252b40",accent:"#f5a623",accent2:"#ff6b35",text:"#e8ecf4",muted:"#6b7599",profit:"#34d399",loss:"#f87171",info:"#60a5fa",purple:"#a78bfa",orange:"#fb923c"};
const CURR=[{code:"THB",symbol:"฿",name:"บาท"},{code:"CNY",symbol:"¥",name:"หยวน"},{code:"LAK",symbol:"₭",name:"กีบ"}];
const CATS=["แฟชั่น / เครื่องแต่งกาย","กระเป๋า / เครื่องประดับ","อิเล็กทรอนิกส์","ของใช้ในบ้าน","ความงาม / สุขภาพ","อาหาร / เครื่องดื่ม","สัตว์เลี้ยง / Pet","อื่นๆ"];
const ORIGINS=["ไทย 🇹🇭","จีน 🇨🇳","อื่นๆ"];
const ORDER_STATUS=[
  {key:"pending",label:"ยังไม่ได้สั่ง",color:"#6b7599",icon:"⏳"},
  {key:"ordered",label:"สั่งแล้ว",color:"#60a5fa",icon:"📦"},
  {key:"arrived",label:"สินค้าถึงแล้ว",color:"#34d399",icon:"✅"},
];

const pc=v=>v>0?C.profit:v<0?C.loss:C.muted;
const fmt=(n,s)=>(s||"฿")+Number(n||0).toFixed(2);
const fmtS=(n,s)=>(s||"฿")+Number(n||0).toFixed(0);
const IS={width:"100%",background:C.surface2,border:"1px solid "+C.border,borderRadius:10,color:C.text,fontSize:15,padding:"10px 13px",outline:"none",boxSizing:"border-box",WebkitAppearance:"none"};

function calcP(b,sh,se,fp){const fee=se*(fp/100),cost=b+sh+fee,profit=se-cost;return{cost,profit,margin:se>0?(profit/se*100):0};}
function calcSell(cost,pct){return pct>=100?0:cost/(1-pct/100);}

let dp=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;window.dispatchEvent(new Event('pwaR'));});

function NumInput({sym,placeholder,defaultValue,onChange}){
  const ref=useRef();
  const timer=useRef();
  const handleChange=useCallback(e=>{
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>onChange(parseFloat(e.target.value)||0),300);
  },[onChange]);
  useEffect(()=>{if(ref.current)ref.current.value=defaultValue||"";},[defaultValue]);
  return React.createElement("div",{style:{position:"relative"}},
    React.createElement("span",{style:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:12,fontWeight:700,color:C.muted,pointerEvents:"none"}},sym||"฿"),
    React.createElement("input",{ref,type:"number",inputMode:"decimal",min:"0",step:"any",placeholder:placeholder||"0",defaultValue:defaultValue||"",onChange:handleChange,style:Object.assign({},IS,{paddingLeft:38})})
  );
}

function StatusBadge({status,small}){
  const st=ORDER_STATUS.find(s=>s.key===status)||ORDER_STATUS[0];
  return React.createElement("span",{style:{display:"inline-flex",alignItems:"center",gap:4,background:st.color+"22",border:"1px solid "+st.color+"55",borderRadius:100,padding:small?"2px 7px":"4px 10px",fontSize:small?9:11,fontWeight:600,color:st.color}},st.icon," ",st.label);
}

  const [syncing,setSy]=useState(false);

  const [editId,setEd]=useState(null);

  const [dbReady,setDbR]=useState(false);
  const [iosHint,setIosH]=useState(false);
  const [listCat,setLC]=useState("ทั้งหมด"); // category filter for list
  const [listOrigin,setLO]=useState("ทั้งหมด"); // origin filter

  // Form text fields

  const [profitBox,setPB]=useState({cost:0,profit:0,margin:0,sellN:0,tmSell:""});
  const [formKey,setFK]=useState(0);

  const unsubRef=useRef();

  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  const curSym=CURR.find(c=>c.code===currency)?.symbol||"฿";

  const recalc=useCallback(()=>{
    const{buy:b,ship:sh,sell:se,fee:fp,tm}=nums.current;
    const sellN=marginMode?calcSell(b+sh,tm):se;
    const pd=calcP(b,sh,sellN,fp);
    setPB({...pd,sellN,tmSell:marginMode&&tm>0?fmt(sellN,curSym):""});
  },[marginMode,curSym]);

  useEffect(()=>{recalc();},[marginMode,currency]);

  useEffect(()=>{
    const setup=()=>{
      setDbR(true);
      const{onSnapshot,collection,query,orderBy}=window.__fs;
      const q=query(collection(window.__db,"products"),orderBy("savedAt","desc"));
      unsubRef.current=onSnapshot(q,snap=>{
        setPr(snap.docs.map(d=>({...d.data(),_docId:d.id})));
        setLd(false);
      },()=>{setLd(false);toast_("⚠️ Firebase ไม่ได้",true);});
    };
    if(window.__dbReady) setup();
    else window.addEventListener("dbReady",setup,{once:true});
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[]);

  useEffect(()=>{
    if(dp){}
    window.addEventListener('pwaR',()=>{});
  },[]);

  const toast_=(msg,warn)=>{setTst({show:true,msg,warn:!!warn});setTimeout(()=>setTst(t=>({...t,show:false})),2800);};

  const installApp=async()=>{
    if(isIOS){setIosH(true);return;}
    if(!dp)return;
    dp.prompt();
    const{outcome}=await dp.userChoice;
    if(outcome==='accepted')toast_("✅ ติดตั้งแอปสำเร็จ!");
    dp=null;
  };

  const handleFiles=files=>Array.from(files).forEach(f=>{
    if(!f.type.startsWith("image/"))return;
    const r=new FileReader();
    r.onload=e=>setImgs(p=>[...p,{id:Date.now()+Math.random(),src:e.target.result}]);
    r.readAsDataURL(f);
  });

  const reset=()=>{
    nums.current={buy:0,ship:0,sell:0,fee:0,tm:0};
    setImgs([]);setName("");setCat("");setCur("THB");setInp("");
    setOrigin("ไทย 🇹🇭");setOS("pending");setMM(false);setNts("");setEd(null);
    setPB({cost:0,profit:0,margin:0,sellN:0,tmSell:""});
    setFK(k=>k+1);
  };

  const saveProd=async()=>{
    if(!name.trim()){toast_("⚠️ กรุณากรอกชื่อสินค้า",true);return;}
    if(!dbReady){toast_("⚠️ ยังเชื่อมต่อไม่ได้",true);return;}
    setSy(true);
    try{
      const{cost,profit,margin,sellN}=profitBox;
      const{buy:b,ship:sh,fee:fp}=nums.current;
      const item={
        name:name.trim(),category:cat,currency,inputter:inputter.trim(),
        origin,orderStatus,
        buyPrice:b,shippingCost:sh,sellPrice:sellN,platformFee:fp,
        totalCost:cost,profit,margin,notes:notes.trim(),
        images:imgs.map(i=>i.src),savedAt:new Date().toISOString()
      };
      const{collection,addDoc,updateDoc,doc}=window.__fs;
      if(editId){await updateDoc(doc(window.__db,"products",editId),item);toast_("✏️ แก้ไขเรียบร้อย!");}
      else{await addDoc(collection(window.__db,"products"),item);toast_("✅ บันทึกสินค้าเรียบร้อย!");}
      reset();
    }catch{toast_("⚠️ บันทึกไม่สำเร็จ",true);}
    setSy(false);
  };

  const editProd=p=>{
    nums.current={buy:p.buyPrice,ship:p.shippingCost,sell:p.sellPrice,fee:p.platformFee,tm:0};
    setEd(p._docId);setName(p.name);setCat(p.category||"");setCur(p.currency||"THB");
    setInp(p.inputter||"");setOrigin(p.origin||"ไทย 🇹🇭");setOS(p.orderStatus||"pending");
    setMM(false);setNts(p.notes||"");
    setImgs((p.images||[]).map(src=>({id:Date.now()+Math.random(),src})));
    const pd=calcP(p.buyPrice,p.shippingCost,p.sellPrice,p.platformFee);
    setPB({...pd,sellN:p.sellPrice,tmSell:""});
    setFK(k=>k+1);setTab("form");toast_("✏️ แก้ไขข้อมูลสินค้า");
  };

  const quickUpdateStatus=async(p,newStatus,e)=>{
    e.stopPropagation();
    try{
      const{updateDoc,doc}=window.__fs;
      await updateDoc(doc(window.__db,"products",p._docId),{orderStatus:newStatus});
      toast_("✅ อัปเดตสถานะแล้ว");
    }catch{toast_("⚠️ อัปเดตไม่สำเร็จ",true);}
  };

  const delProd=async id=>{
    if(!confirm("ยืนยันการลบสินค้านี้?"))return;
    try{const{deleteDoc,doc}=window.__fs;await deleteDoc(doc(window.__db,"products",id));toast_("🗑️ ลบเรียบร้อย");}
    catch{toast_("⚠️ ลบไม่สำเร็จ",true);}
  };

  // Filtered list
  const filtered=useMemo(()=>{
    return prods.filter(p=>{
      const matchSearch=p.name.toLowerCase().includes(search.toLowerCase());
      const matchCat=listCat==="ทั้งหมด"||(p.category||"")=== listCat;
      const matchOrigin=listOrigin==="ทั้งหมด"||(p.origin||"")=== listOrigin;
      return matchSearch&&matchCat&&matchOrigin;
    });
  },[prods,search,listCat,listOrigin]);

  // Summary data
  const summary=useMemo(()=>{
    const total=prods.length;
    const byStatus={pending:0,ordered:0,arrived:0};
    const byOrigin={};
    const byOriginCost={};
    const byCurrency={};
    let totalProfit=0;
    prods.forEach(p=>{
      byStatus[p.orderStatus||"pending"]=(byStatus[p.orderStatus||"pending"]||0)+1;
      const org=p.origin||"ไม่ระบุ";
      byOrigin[org]=(byOrigin[org]||0)+1;
      const sym=CURR.find(c=>c.code===p.currency)?.symbol||"฿";
      if(!byOriginCost[org]) byOriginCost[org]={};
      byOriginCost[org][sym]=(byOriginCost[org][sym]||0)+p.totalCost;
      byCurrency[sym]=(byCurrency[sym]||0)+p.profit;
      totalProfit+=p.profit;
    });
    return{total,byStatus,byOrigin,byOriginCost,byCurrency,totalProfit};
  },[prods]);

  const allCats=["ทั้งหมด",...new Set(prods.map(p=>p.category||"ไม่ระบุ").filter(Boolean))];
  const allOrigins=["ทั้งหมด",...new Set(prods.map(p=>p.origin||"ไม่ระบุ"))];

  const cardS={background:C.surface,border:"1px solid "+C.border,borderRadius:18,padding:"20px 18px",marginBottom:14,position:"relative",overflow:"hidden"};
  const lineS={position:"absolute",top:0,left:0,right:0,height:1,background:"linear-gradient(90deg,transparent,"+C.accent+",transparent)",opacity:.3};
  const ST=(icon,label)=>React.createElement("div",{style:{fontSize:11,fontWeight:700,color:C.accent,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:16,display:"flex",alignItems:"center",gap:8}},icon+" "+label,React.createElement("span",{style:{flex:1,height:1,background:C.border,display:"block"}}));
  const TBtn=({a,o,l,c})=>React.createElement("button",{onClick:o,style:{flex:1,padding:"9px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",border:a?"1px solid "+(c||C.accent):"1px solid "+C.border,background:a?"rgba(245,166,35,0.1)":C.surface2,color:a?(c||C.accent):C.muted}},l);
  const FLabel=({t,req})=>React.createElement("label",{style:{display:"block",fontSize:12,fontWeight:600,color:C.muted,marginBottom:5}},t,req&&React.createElement("span",{style:{color:C.accent2}}," *"));

  // Scroll filter chips
  const FilterChips=({options,value,onChange,color})=>React.createElement("div",{style:{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}},
    options.map(o=>React.createElement("button",{key:o,onClick:()=>onChange(o),style:{
      flexShrink:0,padding:"5px 12px",borderRadius:100,fontSize:12,fontWeight:600,cursor:"pointer",
      border:value===o?"1px solid "+(color||C.accent):"1px solid "+C.border,
      background:value===o?"rgba(245,166,35,0.1)":C.surface2,
      color:value===o?(color||C.accent):C.muted,whiteSpace:"nowrap"
    }},o))
  );

  const TabBar=()=>React.createElement("div",{className:"nb",style:{background:"rgba(13,15,20,0.97)",borderTop:"1px solid "+C.border,display:"flex",flexShrink:0}},
    [["form","➕","เพิ่ม"],["list","📋","รายการ"],["summary","📊","สรุป"]].map(([t,icon,label])=>
      React.createElement("button",{key:t,onClick:()=>setTab(t),style:{flex:1,padding:"10px 8px 8px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===t?C.accent:C.muted,borderTop:tab===t?"2px solid "+C.accent:"2px solid transparent"}},
        React.createElement("span",{style:{fontSize:20}},icon),
        React.createElement("span",{style:{fontSize:10,fontWeight:600}},label)
      )
    )
  );

  return React.createElement("div",{style:{height:"100%",display:"flex",flexDirection:"column",background:C.bg,color:C.text,fontFamily:"system-ui,sans-serif"}},

    // NAV
    React.createElement("div",{className:"nt",style:{background:"rgba(13,15,20,0.97)",borderBottom:"1px solid "+C.border,padding:"12px 16px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
        React.createElement("div",{style:{fontWeight:800,fontSize:18,background:"linear-gradient(135deg,#fff 30%,"+C.accent+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"📦 สำรวจสินค้า"),
        React.createElement("div",{style:{width:7,height:7,borderRadius:"50%",background:dbReady?C.profit:C.loss}})
      ),
      !isStandalone&&React.createElement("button",{onClick:installApp,style:{padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"none",background:"linear-gradient(135deg,"+C.accent+","+C.accent2+")",color:"#0d0f14"}},"⬇️ ติดตั้ง")
    ),

    iosHint&&React.createElement("div",{style:{background:"rgba(245,166,35,0.12)",borderBottom:"1px solid rgba(245,166,35,0.3)",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
      React.createElement("span",{style:{fontSize:13,color:C.accent}},"กด Share 📤 → Add to Home Screen"),
      React.createElement("button",{onClick:()=>setIosH(false),style:{background:"transparent",border:"none",color:C.muted,fontSize:18,cursor:"pointer"}},"×")
    ),

    // CONTENT
    React.createElement("div",{className:"sa",style:{backgroundImage:"radial-gradient(ellipse 80% 40% at 50% -10%,rgba(245,166,35,0.07) 0%,transparent 60%)"}},

      // ===== FORM =====
      tab==="form"&&React.createElement("div",{key:formKey,style:{padding:"16px 16px 24px",maxWidth:780,margin:"0 auto"}},

        React.createElement("div",{style:cardS},
          React.createElement("div",{style:lineS}),
          ST("🖼","รูปภาพสินค้า"),
          React.createElement("div",{style:{border:"2px dashed "+(drag?C.accent:C.border),borderRadius:12,padding:"20px",textAlign:"center",cursor:"pointer",background:drag?"rgba(245,166,35,0.04)":C.surface2},
            onDragOver:e=>{e.preventDefault();setDrag(true)},onDragLeave:()=>setDrag(false),
            onDrop:e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files)},onClick:()=>fileRef.current.click()},
            React.createElement("input",{ref:fileRef,type:"file",accept:"image/*",multiple:true,style:{display:"none"},onChange:e=>handleFiles(e.target.files)}),
            React.createElement("div",{style:{fontSize:28,marginBottom:6}},"🗂️"),
            React.createElement("div",{style:{fontSize:14,color:C.muted}},React.createElement("span",{style:{color:C.accent,fontWeight:600}},"แตะเพื่ออัปโหลด")," — หลายรูปได้")
          ),
          imgs.length>0&&React.createElement("div",null,
            React.createElement("div",{style:{fontSize:12,color:C.muted,marginTop:10,marginBottom:8}},imgs.length+" รูป"),
            React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(72px,1fr))",gap:7}},
              imgs.map(img=>React.createElement("div",{key:img.id,style:{position:"relative",borderRadius:9,overflow:"hidden",aspectRatio:"1",border:"1px solid "+C.border}},
                React.createElement("img",{src:img.src,style:{width:"100%",height:"100%",objectFit:"cover"}}),
                React.createElement("button",{onClick:e=>{e.stopPropagation();setImgs(p=>p.filter(i=>i.id!==img.id))},style:{position:"absolute",top:2,right:2,background:"rgba(0,0,0,0.75)",border:"none",color:"#fff",borderRadius:"50%",width:20,height:20,cursor:"pointer",fontSize:12,lineHeight:"20px",textAlign:"center"}},"×")
              ))
            )
          )
        ),

        React.createElement("div",{style:cardS},
          React.createElement("div",{style:lineS}),
          ST("📋","ข้อมูลสินค้า"),
          React.createElement("div",{style:{marginBottom:14}},
            React.createElement(FLabel,{t:"ชื่อผู้ป้อนข้อมูล"}),
            React.createElement("input",{value:inputter,onChange:e=>setInp(e.target.value),placeholder:"เช่น สมชาย, อ้อย...",style:IS})
          ),
          React.createElement("div",{style:{marginBottom:14}},
            React.createElement(FLabel,{t:"ชื่อสินค้า",req:true}),
            React.createElement("input",{value:name,onChange:e=>setName(e.target.value),placeholder:"เช่น กระเป๋าหนัง PU สีดำ",style:IS})
          ),
          React.createElement("div",{style:{marginBottom:14}},
            React.createElement(FLabel,{t:"หมวดหมู่"}),
            React.createElement("select",{value:cat,onChange:e=>setCat(e.target.value),style:IS},
              React.createElement("option",{value:""},"เลือกหมวดหมู่..."),
              CATS.map(c=>React.createElement("option",{key:c,value:c},c))
            )
